name: Tech briefing

on:
  schedule:
    # Primary: 01:29 UTC = 06:59 IST. GitHub's cron queue adds a few minutes,
    # so the message lands ~07:00–07:15 IST. Odd minute avoids top-of-hour
    # cron congestion.
    - cron: '29 1 * * *'
    # Backup: 02:29 UTC = 07:59 IST. GitHub delays or drops schedule events
    # under load (2026-07-04: the primary cron never fired at all). The guard
    # step skips this run when the primary already handled today, so it only
    # delivers when the primary was dropped — or failed, making it a retry too.
    - cron: '29 2 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read  # guard step lists today's runs

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Skip if an earlier run already handled today
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Manual runs always proceed; only scheduled runs dedupe against
          # each other. Fails open — a broken check must never cost a briefing.
          if [ "$GITHUB_EVENT_NAME" != "schedule" ]; then
            exit 0
          fi
          today=$(date -u +%Y-%m-%d)
          count=$(RUN_ID="$GITHUB_RUN_ID" gh api -X GET \
            "repos/$GITHUB_REPOSITORY/actions/workflows/tech-news.yml/runs" \
            -f event=schedule -f created=">=$today" \
            --jq '[.workflow_runs[]
                   | select(.id != (env.RUN_ID|tonumber))
                   | select(.status == "queued" or .status == "in_progress"
                            or .conclusion == "success")] | length') || count=0
          case "$count" in ''|*[!0-9]*) count=0;; esac
          if [ "$count" -gt 0 ]; then
            echo "An earlier scheduled run already handled today — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.skip != 'true'

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.skip != 'true'
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: pip install -r requirements.txt

      - name: Run briefing
        if: steps.guard.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python tech_news.py
