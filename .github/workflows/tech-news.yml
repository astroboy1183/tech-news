name: Tech briefing

on:
  schedule:
    # Two editions a day, each with a backup an hour later (GitHub delays
    # or drops schedule events under load — 2026-07-04: a primary cron
    # never fired at all; the guard step pairs each backup with its own
    # edition's primary). Odd minutes avoid top-of-hour cron congestion.
    # Morning briefing: 01:29 UTC = 06:59 IST; backup 07:59.
    - cron: '29 1 * * *'
    - cron: '29 2 * * *'
    # Evening wrap: 13:45 UTC = 19:15 IST; backup 20:15.
    - cron: '45 13 * * *'
    - cron: '45 14 * * *'
  workflow_dispatch:
    inputs:
      source:
        description: 'Set to "scheduler" by fleet-scheduler; leave empty for manual runs'
        default: ''
        required: false

permissions:
  contents: write  # the run commits its state back here
  actions: read  # guard step lists today's runs

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Skip if an earlier run already handled this edition
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
          DISPATCH_SOURCE: ${{ inputs.source || '' }}
        run: |
          # Truly-manual runs always proceed; cron runs and scheduler
          # dispatches (source=scheduler) dedupe against each other. Fails open — a broken check must never cost a briefing.
          # Window is 3 hours, NOT today: that pairs each backup with its
          # own edition's primary while letting the evening wrap run
          # after a successful morning briefing.
          if [ "$GITHUB_EVENT_NAME" != "schedule" ] && [ "$DISPATCH_SOURCE" != "scheduler" ]; then
            exit 0
          fi
          since=$(date -u -d '3 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          count=$(RUN_ID="$GITHUB_RUN_ID" gh api -X GET \
            "repos/$GITHUB_REPOSITORY/actions/workflows/tech-news.yml/runs" \
            -f created=">=$since" \
            --jq '[.workflow_runs[]
                   | select(.event == "schedule" or .event == "workflow_dispatch")
                   | select(.id != (env.RUN_ID|tonumber))
                   | select(.status == "queued" or .status == "in_progress"
                            or .conclusion == "success")] | length') || count=0
          case "$count" in ''|*[!0-9]*) count=0;; esac
          if [ "$count" -gt 0 ]; then
            echo "An earlier scheduled run already handled today — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v5
        if: steps.guard.outputs.skip != 'true'

      - uses: actions/setup-python@v6
        if: steps.guard.outputs.skip != 'true'
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: pip install -r requirements.txt

      - name: Run briefing
        if: steps.guard.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TECH_WATCH: ${{ secrets.TECH_WATCH }}
        run: python tech_news.py


      - name: Persist state
        if: steps.guard.outputs.skip != 'true'
        run: |
          # Best-effort: losing state costs tomorrow's context, never
          # today's message (which already went out).
          if [ -n "$(git status --porcelain state/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/
            git commit -m "Update agent state"
            git pull --rebase -q origin main || true
            git push || echo "state push failed (non-fatal)"
          fi

      - name: Alert on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # The 22:15 watchdog only notices tonight — this pings the moment
          # a run dies, from this agent's own bot, with a link to the log.
          curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
            -d chat_id="$TELEGRAM_CHAT_ID" \
            --data-urlencode text="⚠️ $GITHUB_WORKFLOW: run failed — $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            >/dev/null
